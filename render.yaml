services:
  # ───── Backend API (FastAPI) ─────
  - type: web
    name: gestor-tareas-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DATABASE_URL
        fromDatabase:
          name: gestor-tareas-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: DEBUG
        value: "false"
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://gestortareastarjeta.netlify.app
      # ⚠️ Tras el primer deploy, agregá la URL del frontend en Render:
      # Ej: https://gestor-tareas-frontend.onrender.com
      # Podés editarlo desde el Dashboard de Render → Environment

  # ───── Frontend (Vite + React) ─────
  - type: static_site
    name: gestor-tareas-frontend
    region: oregon
    buildCommand: cd Fronted && npm install && npm run build
    staticPublishPath: Fronted/dist
    buildFilter:
      paths:
        - Fronted/**
    envVars:
      - key: VITE_API_URL
        value: https://gestor-tareas-api.onrender.com
      # ⚠️ Ajustá esta URL si el backend se llama distinto en tu dashboard

databases:
  - name: gestor-tareas-db
    region: oregon
    plan: free
    databaseName: gestor_tareas
    user: gestor_user
    ipAllowList: []
